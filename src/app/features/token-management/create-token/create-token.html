<div class="create-page">
  <div class="page-header">
    <h1 class="page-title">Create a new Token</h1>
    <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="cancel()" />
  </div>
  <p-card styleClass="create-card">
    <div class="form-body">
      <div class="field">
        <label class="field-label" for="title">Title <span class="required">*</span></label>
        <input pInputText id="title" [(ngModel)]="title" placeholder="e.g. Grainger Production" class="field-input" />
      </div>
      <div class="field">
        <label class="field-label">Status</label>
        <p-select [(ngModel)]="status" [options]="statusOptions" optionLabel="label" optionValue="value" styleClass="field-select" />
      </div>
      <div class="field">
        <label class="field-label">Expiration date</label>
        <p-datepicker [(ngModel)]="expirationDate" placeholder="mm/dd/yyyy" [showClear]="true" styleClass="field-select" />
      </div>
      <div class="field field-inline">
        <p-checkbox [(ngModel)]="isAdmin" [binary]="true" inputId="isAdmin" />
        <label for="isAdmin" class="inline-title">Is admin (Allow to query buildings in debug mode)</label>
      </div>
      <div class="field field-inline">
        <p-checkbox [(ngModel)]="queryLogging" [binary]="true" inputId="queryLogging" />
        <label for="queryLogging" class="inline-title">Enable query logging</label>
      </div>
      <div class="field">
        <label class="field-label">Notification emails</label>
        <input pInputText [(ngModel)]="notificationEmail" placeholder="Notification emails" class="field-input" />
      </div>
      <div class="field field-inline">
        <p-checkbox [(ngModel)]="unlimited" [binary]="true" inputId="unlimited" />
        <label for="unlimited" class="inline-title">Unlimited amount of requests</label>
      </div>
      <div class="field" *ngIf="!unlimited">
        <label class="field-label">Call limit</label>
        <p-inputnumber [(ngModel)]="callLimit" placeholder="e.g. 5000" [min]="1" styleClass="field-select" />
      </div>
      <div class="form-actions">
        <p-button label="Create" [disabled]="!isValid" (onClick)="create()" styleClass="create-btn" />
      </div>
    </div>
  </p-card>
</div>
